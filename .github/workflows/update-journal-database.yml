name: Update journal database

on:
  push:
    branches:
      - main
      - master
  release:
    types: [published]
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-journal-database:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Update journal database cache
        run: |
          python -m journal_recommender.cli update-journals \
            --journals data/journals.yaml \
            --cache-dir data_raw/cache \
            --report reports/journal_database_changed.md \
            --delay-seconds 5

      - name: Validate journal database
        run: python -m journal_recommender.cli validate-journals data/journals.yaml

      - name: Rebuild vector index
        run: |
          python -m journal_recommender.cli rebuild-index \
            --journals data/journals.yaml \
            --out data/index/journal_corpus.jsonl

      - name: Generate final change report
        run: |
          python -m journal_recommender.cli report-changes \
            --cache-dir data_raw/cache \
            --report reports/journal_database_changed.md \
            --index data/index/journal_corpus.jsonl

      - name: Upload journal database report
        uses: actions/upload-artifact@v4
        with:
          name: journal-database-changed-report
          path: reports/journal_database_changed.md

      - name: Commit generated changes
        if: github.event_name != 'release'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/journals.yaml
          git add data_raw/cache/url_cache.json data_raw/cache/hashes.json data_raw/cache/latest_update_report.json
          git add data/index/journal_corpus.jsonl reports/journal_database_changed.md
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update journal database cache and report"
            git push
          fi
